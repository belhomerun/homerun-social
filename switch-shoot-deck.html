<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Switch Self-Shoot Deck</title>
<meta name="description" content="Homerun Switch self-shoot filming reference — hooks, how-to clips, B-roll, CTAs.">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #24211e;
    --surface: #2e2a26;
    --orange: #fc8f29;
    --orange-dim: rgba(252,143,41,0.15);
    --text: #f0ebe4;
    --muted: #7a6f66;
    --divider: #3a3430;
    --teal: #3db8c9;
    --purple: #9b6cde;
    --green: #52b875;
    --red: #e05555;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
    touch-action: pan-y;
  }

  /* Progress bar */
  #progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    background: var(--orange);
    transition: width 0.2s ease;
    z-index: 100;
  }

  /* Top strip */
  #top-strip {
    position: fixed;
    top: 3px; left: 0; right: 0;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    z-index: 99;
  }

  #card-id {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.12em;
    color: var(--orange);
  }

  #counter {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  #menu-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    padding: 6px;
    line-height: 1;
  }

  /* Card */
  #card {
    position: fixed;
    top: 55px; bottom: 60px;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 28px;
    text-align: center;
    user-select: none;
    cursor: pointer;
  }

  #type-chip {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
    margin-bottom: 24px;
    flex-shrink: 0;
  }

  #main-text {
    font-size: clamp(22px, 5.5vw, 38px);
    font-weight: 700;
    line-height: 1.35;
    letter-spacing: -0.01em;
    text-wrap: balance;
    max-width: 680px;
    flex-shrink: 0;
  }

  #main-text.intro-title {
    font-size: clamp(36px, 10vw, 64px);
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1.1;
    color: var(--orange);
  }

  #sub-text {
    margin-top: 20px;
    font-size: clamp(14px, 3.5vw, 18px);
    color: var(--muted);
    line-height: 1.5;
    max-width: 560px;
    flex-shrink: 0;
  }

  #chips-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 20px;
    flex-shrink: 0;
  }

  .meta-chip {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--divider);
    color: var(--muted);
  }

  #note-text {
    margin-top: 16px;
    font-size: 13px;
    color: var(--red);
    font-weight: 600;
    max-width: 480px;
    flex-shrink: 0;
  }

  /* Bottom strip */
  #bottom-strip {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-top: 1px solid var(--divider);
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--divider);
    border-radius: 10px;
    color: var(--muted);
    font-size: 18px;
    width: 44px; height: 38px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, color 0.15s;
  }

  .nav-btn:active {
    border-color: var(--orange);
    color: var(--orange);
  }

  #section-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Tap zones (invisible) */
  #tap-prev {
    position: fixed;
    top: 55px; bottom: 60px; left: 0;
    width: 35%;
    z-index: 10;
    cursor: pointer;
  }

  #tap-next {
    position: fixed;
    top: 55px; bottom: 60px; right: 0;
    width: 65%;
    z-index: 10;
    cursor: pointer;
  }

  /* Menu overlay */
  #menu-overlay {
    position: fixed;
    inset: 0;
    background: rgba(24,21,18,0.96);
    z-index: 200;
    display: none;
    flex-direction: column;
    overflow-y: auto;
    padding: 20px;
  }

  #menu-overlay.open { display: flex; }

  #menu-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-shrink: 0;
  }

  #menu-header h2 {
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
  }

  #close-menu {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 24px;
    cursor: pointer;
  }

  .menu-section-label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 14px 0 8px;
    border-bottom: 1px solid var(--divider);
    margin-bottom: 4px;
  }

  .menu-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 0;
    border-bottom: 1px solid var(--divider);
    cursor: pointer;
    transition: background 0.1s;
  }

  .menu-item:last-child { border-bottom: none; }

  .menu-item:active { background: var(--surface); }

  .menu-item-id {
    font-size: 11px;
    font-weight: 800;
    color: var(--orange);
    background: var(--orange-dim);
    padding: 3px 8px;
    border-radius: 6px;
    flex-shrink: 0;
    margin-top: 1px;
    font-variant-numeric: tabular-nums;
  }

  .menu-item-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.45;
  }

  /* Transition */
  #card {
    transition: opacity 0.12s ease;
  }

  #card.fade {
    opacity: 0;
  }
</style>
</head>
<body>

<div id="progress-bar"></div>

<div id="top-strip">
  <span id="card-id">START</span>
  <span id="counter">1 / 37</span>
  <button id="menu-btn" aria-label="Contents">☰</button>
</div>

<div id="tap-prev" aria-label="Previous"></div>
<div id="tap-next" aria-label="Next"></div>

<div id="card">
  <span id="type-chip"></span>
  <div id="main-text"></div>
  <div id="sub-text"></div>
  <div id="chips-row"></div>
  <div id="note-text"></div>
</div>

<div id="bottom-strip">
  <button class="nav-btn" id="btn-prev" aria-label="Previous">‹</button>
  <span id="section-label"></span>
  <button class="nav-btn" id="btn-next" aria-label="Next">›</button>
</div>

<div id="menu-overlay">
  <div id="menu-header">
    <h2>Jump to</h2>
    <button id="close-menu" aria-label="Close">✕</button>
  </div>
  <div id="menu-list"></div>
</div>

<script>
const cards = [
  { id: 'START', type: 'intro', section: 'Intro', content: 'Switch Self-Shoot Deck', sub: '37 clips — Hooks · How-to · B-Roll · CTAs', chips: [], note: 'DRAFT — pre-meeting · pre-CIMET approval' },

  // HOOKS
  { id: 'H01', type: 'hook', section: 'Hooks', content: 'What if I told you your sharehouse is being charged just for being loyal to your energy company?', chips: ['Loyalty Tax', 'Reluctant Lifer', 'Educational'] },
  { id: 'H02', type: 'hook', section: 'Hooks', content: 'Your reward for staying with the same energy company? A bigger bill.', chips: ['Loyalty Tax', 'Strategic Stacker', 'Punchy'] },
  { id: 'H03', type: 'hook', section: 'Hooks', content: 'The ACCC found households on the same plan for 3+ years pay around $221 a year more. Is your house one of them?', chips: ['Loyalty Tax', 'Strategic Stacker', 'Data-led'] },
  { id: 'H04', type: 'hook', section: 'Hooks', content: 'Energy companies make more money from customers who never switch. That is literally their business model.', chips: ['Loyalty Tax', 'Punters', 'Blunt'] },
  { id: 'H05', type: 'hook', section: 'Hooks', content: 'The loyalty tax is real and your sharehouse is probably paying it right now.', chips: ['Loyalty Tax', 'Reluctant Lifer', 'Direct'] },
  { id: 'H06', type: 'hook', section: 'Hooks', content: 'Nobody in your house actually knows what energy plan you\'re on, do they.', chips: ['Inertia', 'Reluctant Lifer', 'Knowing'] },
  { id: 'H07', type: 'hook', section: 'Hooks', content: 'I hadn\'t checked our energy plan since we moved in. I wish I had done it sooner.', chips: ['Inertia', 'Reluctant Lifer', 'Personal UGC'] },
  { id: 'H08', type: 'hook', section: 'Hooks', content: 'We were still on whatever the last tenant left us with.', chips: ['Inertia', 'Fresh Start', 'Confessional'] },
  { id: 'H09', type: 'hook', section: 'Hooks', content: 'Energy providers are counting on you never looking. When did your house last check?', chips: ['Inertia', 'Reluctant Lifer', 'Curiosity'] },
  { id: 'H10', type: 'hook', section: 'Hooks', content: 'I compared our energy plan in less time than it takes to make a coffee.', chips: ['Speed', 'Reluctant Lifer', 'Casual'] },
  { id: 'H11', type: 'hook', section: 'Hooks', content: 'Just your postcode. That is actually all it takes to compare energy plans for your sharehouse.', chips: ['Speed', 'Reluctant Lifer', 'Simple'] },
  { id: 'H12', type: 'hook', section: 'Hooks', content: 'Every comparison site I\'ve ever used ends in a sales call. This one doesn\'t even ask for your phone number.', chips: ['Speed', 'Reluctant Lifer', 'Objection removal'] },
  { id: 'H13', type: 'hook', section: 'Hooks', content: 'Our electricity bill went up again and we hadn\'t even used more than usual.', chips: ['Bill Shock', 'Reluctant Lifer', 'Frustrated'] },
  { id: 'H14', type: 'hook', section: 'Hooks', content: 'Bill just landed and it\'s higher than last time. Again. So I finally checked.', chips: ['Bill Shock', 'Strategic Stacker', 'Story opener'] },
  { id: 'H15', type: 'hook', section: 'Hooks', content: 'Just moved in? You do not have to keep whatever plan the last tenant was on.', chips: ['Move-in', 'Fresh Start', 'Helpful'] },
  { id: 'H16', type: 'hook', section: 'Hooks', content: 'The first thing I sort every time I move into a new place now.', chips: ['Move-in', 'Fresh Start', 'Tip'] },
  { id: 'H17', type: 'hook', section: 'Hooks', content: 'One person in our house sorted the electricity. The whole house wins.', chips: ['Collective', 'Social Connector', 'Easy win'] },
  { id: 'H18', type: 'hook', section: 'Hooks', content: 'Things I did as the unofficial house manager that actually made a difference.', chips: ['Collective', 'Property Player', 'House manager'] },
  { id: 'H19', type: 'hook', section: 'Hooks', content: 'Most comparison tools are built for people who own their home. This one is built for renters.', chips: ['Renter Identity', 'All personas', 'Positioning'] },
  { id: 'H20', type: 'hook', section: 'Hooks', content: '69% of Australian sharehouses haven\'t compared their energy plan in 12 months. Is yours one of them?', chips: ['Social Proof', 'Reluctant Lifer', 'Stat-led'] },

  // HOW-TO
  { id: 'HT01', type: 'howto', section: 'How-to', content: 'Go to switch.homerun.app — show the URL bar, then the page loading', sub: 'Screen brightness all the way up. Hold phone steady.', chips: ['Demo clip'] },
  { id: 'HT02', type: 'howto', section: 'How-to', content: 'Tap Electricity or Gas — single decision, straight into the form', sub: 'Show the two options. Tap slowly enough to see the selection register.', chips: ['Demo clip'] },
  { id: 'HT03', type: 'howto', section: 'How-to', content: 'Type in your postcode — no email, no account, no phone number. Just postcode.', sub: 'Film your hand typing it in. Make this visible — it\'s the key friction point.', chips: ['Demo clip', 'Friction removal'] },
  { id: 'HT04', type: 'howto', section: 'How-to', content: 'Scroll the results — plans from multiple retailers side by side', sub: 'Don\'t rush. Retailer names should be visible.', chips: ['Demo clip'] },
  { id: 'HT05', type: 'howto', section: 'How-to', content: 'Walk through all 4 steps verbally — postcode, see the plans, pick one, done', sub: 'Conversational. Think: explaining this to a housemate in the kitchen.', chips: ['Talking head', 'Explainer'] },
  { id: 'HT06', type: 'howto', section: 'How-to', content: 'Explain no phone calls — they don\'t ask for your number so there\'s nothing to pass to a call centre', sub: 'Objection removal. Say it straight.', chips: ['Talking head', 'Objection removal'] },
  { id: 'HT07', type: 'howto', section: 'How-to', content: 'Explain commission honestly — free for you, referral fee if you switch', sub: 'Trust builder. Film it, but check CIMET approval before posting.', chips: ['Talking head', 'Trust'], note: 'CIMET approval required before posting' },

  // B-ROLL
  { id: 'BR01', type: 'broll', section: 'B-Roll', content: 'Close-up of electricity bill — bill number, provider name, amount visible', sub: 'Your own real bill or a mock-up. Visual context for "how much are you paying now?"', chips: ['Visual context'] },
  { id: 'BR02', type: 'broll', section: 'B-Roll', content: 'Phone screen showing comparison results — scroll slowly, retailer names visible', sub: 'Over-shoulder or screen record. Not rushed.', chips: ['Visual context'] },
  { id: 'BR03', type: 'broll', section: 'B-Roll', content: 'Real sharehouse kitchen — heater or electric appliances in shot, winter feel', sub: 'Natural light preferred. Authentic sharehouse — not staged.', chips: ['Scene-setting'] },
  { id: 'BR04', type: 'broll', section: 'B-Roll', content: 'Electric meter or switchboard — shot from below or straight on', sub: 'Context visual. Doesn\'t need to be yours.', chips: ['Visual context'] },

  // CTAs
  { id: 'CTA01', type: 'cta', section: 'CTAs', content: 'Head to switch.homerun.app — link in bio. Just your postcode, takes under 3 minutes.', sub: 'Pairs with any hook. Primary CTA.', chips: ['Primary'] },
  { id: 'CTA02', type: 'cta', section: 'CTAs', content: 'No account, no phone number, no forms. Just postcode. Link in bio.', sub: 'Pairs with H10 · H11 · H12', chips: ['Friction removal'] },
  { id: 'CTA03', type: 'cta', section: 'CTAs', content: 'Worth three minutes to find out. switch.homerun.app — link in bio.', sub: 'Pairs with H01 · H03 · H06 · H09 · H13 · H20', chips: ['Soft close'] },
  { id: 'CTA04', type: 'cta', section: 'CTAs', content: 'See if your sharehouse is overpaying — link in bio.', sub: 'Pairs with H17 · H18', chips: ['House framing'] },
  { id: 'CTA05', type: 'cta', section: 'CTAs', content: 'Call their bluff in 3 minutes. switch.homerun.app.', sub: 'Pairs with H04', chips: ['Punters'] },
];

const typeStyles = {
  intro:  { label: 'Homerun Switch', bg: '#fc8f29', color: '#24211e' },
  hook:   { label: 'Hook',    bg: '#fc8f29', color: '#24211e' },
  howto:  { label: 'How-to',  bg: '#3db8c9', color: '#1a1714' },
  broll:  { label: 'B-Roll',  bg: '#5e5850', color: '#f0ebe4' },
  cta:    { label: 'CTA',     bg: '#9b6cde', color: '#fff' },
};

let current = 0;
let touchStartX = 0;
let touchStartY = 0;

const progressBar = document.getElementById('progress-bar');
const cardIdEl = document.getElementById('card-id');
const counterEl = document.getElementById('counter');
const typeChip = document.getElementById('type-chip');
const mainText = document.getElementById('main-text');
const subText = document.getElementById('sub-text');
const chipsRow = document.getElementById('chips-row');
const noteText = document.getElementById('note-text');
const sectionLabel = document.getElementById('section-label');
const cardEl = document.getElementById('card');

function render(idx, dir) {
  const c = cards[idx];
  const style = typeStyles[c.type];

  cardEl.classList.add('fade');
  setTimeout(() => {
    progressBar.style.width = ((idx + 1) / cards.length * 100) + '%';
    cardIdEl.textContent = c.id;
    counterEl.textContent = `${idx + 1} / ${cards.length}`;
    sectionLabel.textContent = c.section;

    typeChip.textContent = style.label;
    typeChip.style.background = style.bg;
    typeChip.style.color = style.color;

    if (c.type === 'intro') {
      mainText.textContent = c.content;
      mainText.className = 'intro-title';
    } else {
      mainText.textContent = c.content;
      mainText.className = '';
    }

    subText.textContent = c.sub || '';
    subText.style.display = c.sub ? '' : 'none';

    chipsRow.innerHTML = '';
    (c.chips || []).forEach(ch => {
      const span = document.createElement('span');
      span.className = 'meta-chip';
      span.textContent = ch;
      chipsRow.appendChild(span);
    });

    noteText.textContent = c.note || '';
    noteText.style.display = c.note ? '' : 'none';

    cardEl.classList.remove('fade');
  }, 120);
}

function go(delta) {
  const next = Math.max(0, Math.min(cards.length - 1, current + delta));
  if (next === current) return;
  current = next;
  render(current, delta);
}

document.getElementById('btn-prev').addEventListener('click', e => { e.stopPropagation(); go(-1); });
document.getElementById('btn-next').addEventListener('click', e => { e.stopPropagation(); go(1); });
document.getElementById('tap-prev').addEventListener('click', () => go(-1));
document.getElementById('tap-next').addEventListener('click', () => go(1));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(-1);
});

// Swipe
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    go(dx < 0 ? 1 : -1);
  }
}, { passive: true });

// Menu
const menuOverlay = document.getElementById('menu-overlay');
const menuList = document.getElementById('menu-list');

document.getElementById('menu-btn').addEventListener('click', () => {
  menuOverlay.classList.add('open');
});
document.getElementById('close-menu').addEventListener('click', () => {
  menuOverlay.classList.remove('open');
});

// Build menu
const sections = {};
cards.forEach((c, i) => {
  if (!sections[c.section]) sections[c.section] = [];
  sections[c.section].push({ card: c, idx: i });
});

Object.entries(sections).forEach(([section, items]) => {
  const label = document.createElement('div');
  label.className = 'menu-section-label';
  label.textContent = section;
  menuList.appendChild(label);

  items.forEach(({ card, idx }) => {
    const item = document.createElement('div');
    item.className = 'menu-item';
    item.innerHTML = `<span class="menu-item-id">${card.id}</span><span class="menu-item-text">${card.content}</span>`;
    item.addEventListener('click', () => {
      current = idx;
      render(current, 1);
      menuOverlay.classList.remove('open');
    });
    menuList.appendChild(item);
  });
});

render(0, 1);
</script>
</body>
</html>
